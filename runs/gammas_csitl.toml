# End-to-end application: 511 keV gammas uniform over the front XY face (z = 0),
# direction +z, CsI(Tl) CRYSP crystal, calibrated optics, per-event SiPM outputs.
[campaign]
tag = "gammas_csitl"
n_events = 5000
seed = 7
batch_photons = 2000000

[crystal]
material = "csitl"          # optical properties (calibrated split, n, yield, tau)
size_mm = [48.0, 48.0, 37.2]

[gamma]
density = 4.51              # g/cm3
xcom = "xcom_CSI.csv"       # CsI compound: same table for pure and Tl-doped

[wrap]
material = "teflon"

[surface]
finish = "backpainted"
sigma_alpha_deg = 1.3

[sipm]
material = "sipm_s14160"
coupling_n = 1.45
pde_override = 0.40         # flat PDE for the CNN dataset (= S14160 at 550 nm)

[binning]
bin_ns = 100.0
window_ns = 8000.0
