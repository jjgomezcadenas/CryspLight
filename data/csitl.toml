# CsI(Tl), room temperature, at the 550 nm emission peak.
# Measured EXTINCTION: Knyazev et al., NIM A 1003 (2021) 165302 (Amcrys-h): 311.5 mm
# (28-34 cm across the band, +-15% crystal-to-crystal). A transmission measurement
# conflates absorption + scattering; the split below (f = 0.90: abs = 311.5/(1-f),
# rayleigh = 311.5/f) is the CryspLight phase-1 fit to the Brose et al.
# (arXiv physics/9805010) Fig. 7 wrapping ladder — see runs/csitl_calib.toml and
# output/csitl_calib/. Bracket f = 0.85-0.92; tapered-geometry (phase 2) pending.
# Surface (UNIFIED, air gap): sigma_alpha 1.3 deg polished / ~18 deg lapped
# (Janecek & Moses, IEEE TNS 57 (2010) 964) — the ladder fit prefers 1.3 unfitted.
# Fitted effective Teflon reflectivities (Lambertian, air gap): 0.754 (1x38um),
# 0.840 (200um monolayer), 0.934 (3x38um), 0.965 (4x38um); saturated >= 0.5-1 mm: 0.99.
name = "CsI(Tl)"
n = 1.79                    # Brose et al.; Knyazev uses 1.80
abs_length_mm = 3115.0      # true absorption, from the f = 0.90 split of the extinction
rayleigh_mm = 346.0         # scattering, from the same split
yield_per_mev = 54000
tau_ns = 1000.0             # single-tau approx; components ~730 ns (64%) + 3340 ns (36%)
lambda_nm = 550.0
x0_mm = 18.6
